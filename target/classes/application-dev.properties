# Spring Boot Configuration
spring.application.name=projeto-A3
spring.profiles.active=dev

# Server
server.port=8080
server.servlet.context-path=/

# Database H2 - COM ARQUIVO (PERSISTENTE)
spring.datasource.url=jdbc:h2:./data/projeto_a3
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Thymeleaf
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Data Initialization - Executa DEPOIS do Hibernate criar as tabelas
spring.jpa.defer-datasource-initialization=true

# Session
spring.session.store-type=none

# Logging
logging.level.root=INFO
logging.level.meuprojeto=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
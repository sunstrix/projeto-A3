<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Sistema Admin</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/admin/dashboard">Dashboard</a>
                <a class="nav-link" href="/admin/gerenciar-usuarios">Usuários</a>
                <a class="nav-link" href="/admin/gerenciar-projetos">Projetos</a>
                <a class="nav-link" href="/admin/gerenciar-equipes">Equipes</a>
            </div>
        </div>
    </nav>
    
    <div class="container mt-5">
        <h2>Dashboard Administrativo</h2>
        <div class="row">
            <div class="col-md-3">
                <div class="card text-white bg-primary mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Total Usuários</h5>
                        <p class="card-text" th:text="${totalUsuarios}"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="navbar">
<head>
    <style>
        /* Estilos do Menu Lateral */
        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px 0;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 0 20px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }

        .sidebar-header h3 {
            color: white;
            font-size: 18px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-header .user-info {
            color: #a0aec0;
            font-size: 13px;
            margin-top: 5px;
        }

        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
            flex: 1;
        }

        .sidebar-menu li {
            padding: 0 10px;
            margin-bottom: 5px;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            color: #cbd5e0;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 500;
        }

        .sidebar-menu a:hover {
            background: rgba(108, 92, 231, 0.2);
            color: white;
            transform: translateX(4px);
        }

        .sidebar-menu a i {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .btn-logout {
            width: 100%;
            padding: 10px;
            background: rgba(231, 76, 60, 0.2);
            color: #ff6b6b;
            border: 1px solid #ff6b6b;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-logout:hover {
            background: #ff6b6b;
            color: white;
        }

        /* Conteúdo principal */
        .main-content {
            margin-left: 250px;
            padding: 30px;
            min-height: 100vh;
            background: #f5f7fa;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
                padding: 15px 0;
            }
            .sidebar-header h3,
            .sidebar-header .user-info,
            .sidebar-menu a span {
                display: none;
            }
            .sidebar-menu a {
                justify-content: center;
                padding: 12px;
            }
            .sidebar-menu a i {
                margin: 0;
            }
            .main-content {
                margin-left: 70px;
            }
        }
    </style>
</head>
<body>
    <nav class="sidebar" th:fragment="navbar">
        <div class="sidebar-header">
            <h3>🚀 Projeto A3</h3>
            <div class="user-info" th:if="${session.usuarioLogado != null}">
                <span th:text="${session.usuarioLogado.nome}">Usuário</span><br>
                <small th:text="${session.usuarioLogado.perfil.descricao}">Perfil</small>
            </div>
        </div>

        <ul class="sidebar-menu">
            <!-- Dashboard - Todos os perfis -->
            <li>
                <a th:href="@{/}">
                    <i>📊</i><span>Dashboard</span>
                </a>
            </li>

            <!-- Usuários - Apenas ADMIN -->
            <li th:if="${session.usuarioLogado != null and session.usuarioLogado.perfil.name() == 'ADMINISTRADOR'}">
                <a th:href="@{/usuarios}">
                    <i>👥</i><span>Usuários</span>
                </a>
            </li>

            <!-- Projetos - ADMIN e GERENTE -->
            <li th:if="${session.usuarioLogado != null and (session.usuarioLogado.perfil.name() == 'ADMINISTRADOR' or session.usuarioLogado.perfil.name() == 'GERENTE')}">
                <a th:href="@{/projetos}">
                    <i>📁</i><span>Projetos</span>
                </a>
            </li>
            
            <!-- Kanban - ADMIN e GERENTE -->
            <li th:if="${session.usuarioLogado != null and (session.usuarioLogado.perfil.name() == 'ADMINISTRADOR' or session.usuarioLogado.perfil.name() == 'GERENTE')}">
                <a th:href="@{/projetos/kanban}">
                    <i>📋</i><span>Kanban</span>
                </a>
            </li>

            <!-- Equipes - ADMIN e GERENTE -->
            <li th:if="${session.usuarioLogado != null and (session.usuarioLogado.perfil.name() == 'ADMINISTRADOR' or session.usuarioLogado.perfil.name() == 'GERENTE')}">
                <a th:href="@{/equipes}">
                    <i>👨‍💼</i><span>Equipes</span>
                </a>
            </li>

            <!-- Relatórios - ADMIN e GERENTE -->
            <li th:if="${session.usuarioLogado != null and (session.usuarioLogado.perfil.name() == 'ADMINISTRADOR' or session.usuarioLogado.perfil.name() == 'GERENTE')}">
                <a th:href="@{/relatorios/dashboard}">
                    <i>📈</i><span>Relatórios</span>
                </a>
            </li>

            <!-- Minhas Tarefas - COLABORADOR -->
            <li th:if="${session.usuarioLogado != null and session.usuarioLogado.perfil.name() == 'COLABORADOR'}">
                <a th:href="@{/tarefas/minhas}">
                    <i>✅</i><span>Minhas Tarefas</span>
                </a>
            </li>
        </ul>

        <div class="sidebar-footer">
            <a th:href="@{/logout}" class="btn-logout" onclick="return confirm('Deseja realmente sair?')">
                <i>🚪</i><span>Sair</span>
            </a>
        </div>
    </nav>
</body>
</html>

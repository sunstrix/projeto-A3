# =====================================================
# CONFIGURAÇÃO DO SERVIDOR
# =====================================================
server.port=8080

# =====================================================
# CONEXÃO COM BANCO DE DADOS - PostgreSQL
# =====================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/projeto_a3
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# =====================================================
# CONFIGURAÇÕES DO JPA / HIBERNATE
# =====================================================
# update = cria/atualiza tabelas automaticamente (ideal para desenvolvimento)
# validate = apenas valida se as tabelas existem
# create = dropa e recria as tabelas a cada inicialização (CUIDADO!)
spring.jpa.hibernate.ddl-auto=update

# Mostrar SQL gerado no console (true para debug, false para produção)
spring.jpa.show-sql=true

# Dialeto específico para PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Formatador de SQL para melhor leitura no console
spring.jpa.properties.hibernate.format_sql=true

# =====================================================
# INICIALIZAÇÃO DE DADOS
# =====================================================
# Desativar execução automática de scripts SQL (import.sql, data.sql, etc.)
spring.sql.init.mode=never

# =====================================================
# H2 CONSOLE (Desativado para produção)
# =====================================================
spring.h2.console.enabled=false

# =====================================================
# LOGGING (Opcional - para ajustar nível de log)
# =====================================================
# logging.level.root=INFO
# logging.level.meuprojeto=DEBUG
# logging.level.org.springframework.web=INFO
# =====================================================
# CONFIGURAÇÃO DO SERVIDOR
# =====================================================
server.port=8080

# =====================================================
# CONEXÃO COM BANCO DE DADOS - PostgreSQL 17
# =====================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/projeto_a3
spring.datasource.username=postgres
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# =====================================================
# CONFIGURAÇÕES DO JPA / HIBERNATE
# =====================================================
# update = cria/atualiza tabelas automaticamente (ideal para dev)
spring.jpa.hibernate.ddl-auto=update
# Mostra as queries SQL no console (útil para debug)
spring.jpa.show-sql=true
# Dialeto específico para PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Formata o SQL no console para facilitar leitura
spring.jpa.properties.hibernate.format_sql=true

# =====================================================
# INICIALIZAÇÃO DE DADOS
# =====================================================
# Desativa execução automática de scripts SQL externos
spring.sql.init.mode=never

# =====================================================
# H2 CONSOLE (Desativado para produção)
# =====================================================
spring.h2.console.enabled=false
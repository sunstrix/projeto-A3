<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Usuário</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .error {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-submit {
            background: #667eea;
            color: white;
        }
        
        .btn-submit:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        
        .btn-cancel {
            background: #ecf0f1;
            color: #333;
        }
        
        .btn-cancel:hover {
            background: #d5dbdb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Novo Usuário</h1>
        
        <div th:if="${erro}" class="error-message" th:text="${erro}"></div>
        
        <form th:action="${usuario.id} ? @{/usuarios/atualizar/{id}(id=${usuario.id})} : @{/usuarios}" 
              th:object="${usuario}" method="post">
            
            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" th:field="*{nome}" required>
                <div class="error" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
            </div>
            
            <div class="form-group">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" th:field="*{cpf}" placeholder="000.000.000-00" required th:disabled="${usuario.id}">
                <div class="error" th:if="${#fields.hasErrors('cpf')}" th:errors="*{cpf}"></div>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" th:field="*{email}" required>
                <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>
            
            <div class="form-group">
                <label for="cargo">Cargo</label>
                <input type="text" id="cargo" th:field="*{cargo}" required>
                <div class="error" th:if="${#fields.hasErrors('cargo')}" th:errors="*{cargo}"></div>
            </div>
            
            <div class="form-group">
                <label for="login">Login</label>
                <input type="text" id="login" th:field="*{login}" required th:disabled="${usuario.id}">
                <div class="error" th:if="${#fields.hasErrors('login')}" th:errors="*{login}"></div>
            </div>
            
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" th:field="*{senha}" required>
                <div class="error" th:if="${#fields.hasErrors('senha')}" th:errors="*{senha}"></div>
            </div>
            
            <div class="form-group">
                <label for="perfil">Perfil</label>
                <select id="perfil" th:field="*{perfil}" required>
                    <option value="">Selecione um perfil</option>
                    <option th:each="perfil : ${perfis}" th:value="${perfil}" th:text="${perfil.descricao}"></option>
                </select>
                <div class="error" th:if="${#fields.hasErrors('perfil')}" th:errors="*{perfil}"></div>
            </div>
            
            <div class="buttons">
                <button type="submit" class="btn-submit">Salvar</button>
                <a href="/usuarios" class="btn-cancel" style="display: flex; align-items: center; justify-content: center; text-decoration: none;">Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }
        
        h1 {
            color: #333;
        }
        
        .btn-novo {
            background: #667eea;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
        }
        
        .btn-novo:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        
        td {
            padding: 15px;
            border-bottom: 1px solid #ecf0f1;
        }
        
        tr:hover {
            background: #f9f9f9;
        }
        
        .acoes {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
        }
        
        .btn-editar {
            background: #3498db;
            color: white;
        }
        
        .btn-editar:hover {
            background: #2980b9;
            transform: translateY(-1px);
        }
        
        .btn-deletar {
            background: #e74c3c;
            color: white;
        }
        
        .btn-deletar:hover {
            background: #c0392b;
            transform: translateY(-1px);
        }
        
        .vazio {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
            background: white;
            border-radius: 8px;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-admin {
            background: #e74c3c;
            color: white;
        }
        
        .badge-gerente {
            background: #f39c12;
            color: white;
        }
        
        .badge-colaborador {
            background: #27ae60;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👥 Usuários</h1>
            <a href="/usuarios/novo" class="btn-novo">+ Novo Usuário</a>
        </div>
        
        <table th:if="${!usuarios.isEmpty()}">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>Email</th>
                    <th>Cargo</th>
                    <th>Perfil</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="usuario : ${usuarios}">
                    <td th:text="${usuario.nome}"></td>
                    <td th:text="${usuario.cpf}"></td>
                    <td th:text="${usuario.email}"></td>
                    <td th:text="${usuario.cargo}"></td>
                    <td>
                        <span class="badge" 
                              th:classappend="${usuario.perfil.name() == 'ADMINISTRADOR'} ? badge-admin : ${usuario.perfil.name() == 'GERENTE'} ? badge-gerente : badge-colaborador"
                              th:text="${usuario.perfil.descricao}"></span>
                    </td>
                    <td>
                        <span th:text="${usuario.ativo ? 'Ativo' : 'Inativo'}"
                              th:style="${usuario.ativo ? 'color: #27ae60' : 'color: #e74c3c'}"></span>
                    </td>
                    <td>
                        <div class="acoes">
                            <a th:href="@{/usuarios/editar/{id}(id=${usuario.id})}" class="btn btn-editar">Editar</a>
                            <a th:href="@{/usuarios/deletar/{id}(id=${usuario.id})}" class="btn btn-deletar" 
                               onclick="return confirm('Tem certeza que deseja deletar?')">Deletar</a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <div class="vazio" th:if="${usuarios.isEmpty()}">
            <p>Nenhum usuário cadastrado. <a href="/usuarios/novo">Clique aqui</a> para adicionar um.</p>
        </div>
    </div>
</body>
</html>

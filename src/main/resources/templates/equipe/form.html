<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Equipe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .error {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-submit {
            background: #667eea;
            color: white;
        }
        
        .btn-submit:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        
        .btn-cancel {
            background: #ecf0f1;
            color: #333;
        }
        
        .btn-cancel:hover {
            background: #d5dbdb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nova Equipe</h1>
        
        <div th:if="${erro}" class="error-message" th:text="${erro}"></div>
        
        <form th:action="${equipe.id} ? @{/equipes/atualizar/{id}(id=${equipe.id})} : @{/equipes}" 
              th:object="${equipe}" method="post">
            
            <div class="form-group">
                <label for="nome">Nome da Equipe</label>
                <input type="text" id="nome" th:field="*{nome}" required>
                <div class="error" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
            </div>
            
            <div class="form-group">
                <label for="descricao">Descrição</label>
                <textarea id="descricao" th:field="*{descricao}"></textarea>
            </div>
            
            <div class="form-group">
                <label for="lider">Líder da Equipe</label>
                <select id="lider" th:field="*{lider}" required>
                    <option value="">Selecione um líder</option>
                    <option th:each="lider : ${lideres}" th:value="${lider.id}" th:text="${lider.nome}"></option>
                </select>
                <div class="error" th:if="${#fields.hasErrors('lider')}" th:errors="*{lider}"></div>
            </div>
            
            <div class="buttons">
                <button type="submit" class="btn-submit">Salvar</button>
                <a href="/equipes" class="btn-cancel" style="display: flex; align-items: center; justify-content: center; text-decoration: none;">Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>
